<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HeapScope</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #1C1C1E;
    --panel: #2C2C2E;
    --border: #3A3A3C;
    --fg: #F2F2F7;
    --muted: #8E8E93;
    --reachable: #34C759;
    --leaked: #FF3B30;
    --cycle: #AF52DE;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
    font-size: 13px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 28px;
    align-items: baseline;
    flex-wrap: wrap;
  }
  header .title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  header .stat { display: inline-flex; gap: 6px; align-items: baseline; }
  header .stat .label {
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  header .stat .value {
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  header .stat.leaked .value { color: var(--leaked); }
  header .stat.cycle .value { color: var(--cycle); }

  #drop-zone {
    position: absolute; inset: 52px 0 0 0;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    color: var(--muted);
    pointer-events: none;
    font-size: 14px;
    z-index: 10;
  }
  #drop-zone.visible { pointer-events: auto; background: rgba(28,28,30,0.92); }
  #drop-zone .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; color: var(--fg); }
  #drop-zone button {
    margin-top: 14px;
    background: var(--reachable);
    color: #000;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
  }
  svg { display: block; width: 100%; height: calc(100vh - 49px); background: var(--bg); }
  .link { stroke: #48484A; stroke-opacity: 0.55; }
  .node { cursor: pointer; }

  .tooltip {
    position: absolute;
    padding: 8px 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    line-height: 1.55;
    max-width: 280px;
  }
  .tooltip .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: var(--muted); }

  .legend {
    position: absolute; right: 18px; bottom: 18px;
    background: rgba(28,28,30,0.9);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 11px;
    line-height: 1.8;
    backdrop-filter: blur(14px);
  }
  .legend .dot {
    display: inline-block; width: 9px; height: 9px;
    border-radius: 50%; margin-right: 7px; vertical-align: middle;
  }
</style>
</head>
<body>
<header>
  <span class="title">HeapScope</span>
  <span class="stat"><span class="label">pid</span><span class="value" id="s-pid">—</span></span>
  <span class="stat"><span class="label">total</span><span class="value" id="s-total">—</span></span>
  <span class="stat"><span class="label">reachable</span><span class="value" id="s-reachable">—</span></span>
  <span class="stat leaked"><span class="label">leaked</span><span class="value" id="s-leaked">—</span></span>
  <span class="stat leaked"><span class="label">bytes</span><span class="value" id="s-bytes">—</span></span>
  <span class="stat cycle"><span class="label">cycles</span><span class="value" id="s-cycles">—</span></span>
</header>
<div id="drop-zone" class="visible">
  <div>
    Drop a <span class="mono">leaks.json</span> file here
    <br>
    <button id="pick-file">Choose file…</button>
    <input type="file" id="file" accept="application/json" style="display:none">
  </div>
</div>
<svg id="svg"></svg>
<div class="legend">
  <div><span class="dot" style="background: var(--reachable)"></span>Reachable</div>
  <div><span class="dot" style="background: var(--leaked)"></span>Leaked</div>
  <div><span class="dot" style="background: var(--cycle)"></span>Leaked (in cycle)</div>
</div>
<div class="tooltip" id="tooltip" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
(function () {
  const svg = d3.select('#svg');
  const tooltip = document.getElementById('tooltip');
  const drop = document.getElementById('drop-zone');

  document.getElementById('pick-file').addEventListener('click', () => {
    document.getElementById('file').click();
  });
  document.getElementById('file').addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f) readFile(f);
  });
  document.body.addEventListener('dragover', (e) => {
    e.preventDefault();
    drop.classList.add('visible');
  });
  document.body.addEventListener('drop', (e) => {
    e.preventDefault();
    const f = e.dataTransfer.files[0];
    if (f) readFile(f);
  });

  function readFile(f) {
    const r = new FileReader();
    r.onload = () => {
      try { render(JSON.parse(r.result)); }
      catch (err) { alert('Invalid JSON: ' + err); }
    };
    r.readAsText(f);
  }

  // ?file= query-param mode for `python3 -m http.server` workflows.
  const params = new URLSearchParams(location.search);
  if (params.has('file')) {
    fetch(params.get('file'))
      .then((r) => r.json())
      .then(render)
      .catch((err) => console.warn('fetch failed:', err));
  }

  function render(data) {
    drop.classList.remove('visible');
    drop.style.display = 'none';

    document.getElementById('s-pid').textContent = data.pid ?? '—';
    document.getElementById('s-total').textContent = data.summary.total_allocations;
    document.getElementById('s-reachable').textContent = data.summary.reachable;
    document.getElementById('s-leaked').textContent = data.summary.leaked;
    document.getElementById('s-bytes').textContent = formatBytes(data.summary.leaked_bytes);
    document.getElementById('s-cycles').textContent = data.summary.cycles_found;

    const w = window.innerWidth;
    const h = window.innerHeight - 49;
    svg.attr('viewBox', `0 0 ${w} ${h}`);
    svg.selectAll('*').remove();

    const g = svg.append('g');
    svg.call(d3.zoom().scaleExtent([0.15, 6]).on('zoom', (e) => {
      g.attr('transform', e.transform);
    }));

    const idMap = new Map();
    data.nodes.forEach((n, i) => idMap.set(n.id, i));

    // Log-scaled radius: tiny allocations stay readable, huge blocks don't dominate.
    const nodes = data.nodes.map((n) => ({
      ...n,
      r: Math.max(4, Math.min(28, 3 + Math.log2(Math.max(2, n.size)))),
    }));
    const links = (data.edges || [])
      .filter((e) => idMap.has(e.from) && idMap.has(e.to) && e.from !== e.to)
      .map((e) => ({ source: idMap.get(e.from), target: idMap.get(e.to) }));

    const link = g.append('g')
      .selectAll('line')
      .data(links).enter().append('line')
      .attr('class', 'link')
      .attr('stroke-width', 1);

    const node = g.append('g')
      .selectAll('circle')
      .data(nodes).enter().append('circle')
      .attr('class', 'node')
      .attr('r', (d) => d.r)
      .attr('fill', (d) =>
        d.in_cycle ? 'var(--cycle)' : (d.reachable ? 'var(--reachable)' : 'var(--leaked)'))
      .attr('stroke', '#1C1C1E')
      .attr('stroke-width', 1.5)
      .call(d3.drag()
        .on('start', (e, d) => {
          if (!e.active) sim.alphaTarget(0.3).restart();
          d.fx = d.x; d.fy = d.y;
        })
        .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on('end', (e, d) => {
          if (!e.active) sim.alphaTarget(0);
          d.fx = null; d.fy = null;
        }))
      .on('mousemove', (e, d) => {
        tooltip.style.display = 'block';
        tooltip.style.left = (e.pageX + 12) + 'px';
        tooltip.style.top = (e.pageY + 12) + 'px';
        const cls = d.in_cycle ? 'in cycle' : (d.reachable ? 'reachable' : 'leaked');
        tooltip.innerHTML =
          '<div class="mono">' + escapeHtml(d.id) + '</div>' +
          '<div>' + d.size + ' bytes · ' + cls + '</div>' +
          '<div class="mono">zone: ' + escapeHtml(d.zone) + '</div>';
      })
      .on('mouseleave', () => { tooltip.style.display = 'none'; });

    const sim = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).distance(60).strength(0.55))
      .force('charge', d3.forceManyBody().strength(-140))
      .force('center', d3.forceCenter(w / 2, h / 2))
      .force('collide', d3.forceCollide().radius((d) => d.r + 3))
      .on('tick', () => {
        link
          .attr('x1', (d) => d.source.x).attr('y1', (d) => d.source.y)
          .attr('x2', (d) => d.target.x).attr('y2', (d) => d.target.y);
        node
          .attr('cx', (d) => d.x).attr('cy', (d) => d.y);
      });
  }

  function formatBytes(n) {
    if (n == null) return '—';
    if (n < 1024) return n + ' B';
    if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
    return (n / 1048576).toFixed(1) + ' MB';
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }
})();
</script>
</body>
</html>
